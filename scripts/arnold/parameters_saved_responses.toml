# Compute response functions from scratch for a saved calibration iteration.
#
# Usage:
#   julia --threads auto --project=. scripts/arnold/plot_saved_responses.jl --params scripts/arnold/parameters_saved_responses.toml

[paths]
# Leave target_dir empty to use the latest run under runs_root.
# Valid targets:
# - run folder, e.g. scripts/arnold/runs_calibration/run_082
# - method_unet folder, e.g. .../run_082/method_unet
# - specific iter folder, e.g. .../run_082/method_unet/iter_001
target_dir = "scripts/arnold/runs_calibration/run_082/iter_001"
runs_root = "scripts/arnold/runs_calibration"

# Optional explicit calibration config path. Leave empty to use
# <run_dir>/config/parameters_calibration.toml.
calibration_config = ""

# Outputs are written under:
#   <run_dir>/<output_subdir>/<iter_name>/<output_name>/
output_subdir = "saved_response_analysis"
output_name = "responses_recomputed"

[run]
# If target_dir points to a run folder or method_unet folder, choose the
# iteration here. Set iteration = 0 and auto_latest_iteration = true to use the
# latest saved iteration.
iteration = 0
auto_latest_iteration = true

[methods]
unet = false
gaussian = true
finite_difference = false

# If true, compute response functions by direct perturbed trajectory integration.
# This is the expensive "numerical truth" method producing time-dependent curves.
numerical_integration = true

# Methods to include in the multipanel response figure.
# "finite_difference" contributes asymptotic Jacobian bars only.
response_methods = ["numerical_integration", "gaussian", "unet", "finite_difference"]

[datasets]
# Fresh GFDT dataset generated by this standalone script.
gfdt_nsamples = 250_000
gfdt_save_every = 2
gfdt_rng_seed_base = 3000
spinup_steps = 50_000
gfdt_ensemble_trajectories = 1
gfdt_parallel_trajectories = true
max_abs_state = 1.0e4
max_restarts = 40
state_min = -1.0e300
state_max = 1.0e300
max_boundary_hits = 40

[responses]
# Response plot type for the figure/archive:
# - "heaviside": plot the step responses R_step(t)
# - "impulse": plot the impulse responses C(t) obtained from R_step
response_kind = "heaviside"

# Total response horizon. If dt_obs = dt * gfdt_save_every, the code uses
# n_lags = floor(response_tmax / dt_obs) and integrates perturbed trajectories
# long enough to estimate the response on times 0, dt_obs, ..., n_lags*dt_obs.
response_tmax = 5.0

# Time window used to average the tail of the step response when extracting the
# asymptotic parameter Jacobian from the numerical/Gaussian/UNet response curves.
t_start = 2.0
t_end = 5.0

# These affect only GFDT-based Gaussian/UNet response construction, not the
# direct numerical trajectory perturbation method below.
mean_center = true
impulse_tail_debias = true
impulse_tail_taper = "hard"
apply_score_correction = true

# divergence_mode options: "hutchinson", "fd_axis", "exact"
divergence_mode = "hutchinson"
divergence_eps = 0.03
divergence_probes = 10
score_device = "GPU:0"
score_forward_mode = "test"
batch_size = 1024

[numerical]
# Settings for the direct numerical response estimator and, when enabled, the
# asymptotic finite-difference parameter Jacobian.
#
# Numerical response workflow:
# 1. Select `init_ensembles` initial states from the freshly generated GFDT data.
# 2. For each parameter i, perturb theta_i by +-h_i.
# 3. Integrate the perturbed trajectories forward up to `response_tmax`.
# 4. Estimate the observable response from the centered finite difference.
#
# The perturbation step for parameter i is
#   h_i = max(h_abs[i], h_rel * max(abs(theta_i), 1.0))
# and can be reduced further if the perturbed runs are unstable.

# Used only in the non-ensemble FD Jacobian mode. It sets how many steady-state
# samples are averaged for each perturbed parameter value.
nsamples = 120_000

# Spinup length, in fine integration steps, before collecting observables from a
# perturbed trajectory in the direct FD/Jacobian calculations.
spinup = 2_000

# Absolute lower bounds for the centered parameter perturbations
# [alpha0, alpha1, alpha2, alpha3, sigma].
h_abs = [0.05, 0.02, 0.01, 0.002, 0.05]

# Relative perturbation floor. The effective step uses max(h_abs[i], h_rel*scale).
h_rel = 0.005

# Base random seed for the perturbed numerical integrations. Different
# parameters/attempts/trajectories derive deterministic offsets from this seed.
seed_base = 50_000_000

# If true, estimate the FD Jacobian from an ensemble of shorter trajectories;
# if false, use a single long steady-state averaging run controlled by `nsamples`.
use_ensemble = true

# Number of independent perturbed trajectories per parameter in ensemble FD mode.
ensemble_trajectories = 1200

# Number of initial states taken from the generated GFDT dataset for the direct
# numerical response curves. The code uses min(init_ensembles, size(X,2)).
init_ensembles = 36

# Number of saved observable samples collected from each perturbed trajectory in
# ensemble FD mode when estimating asymptotic Jacobian columns.
samples_per_trajectory = 6_000

# Observation thinning for the FD/Jacobian trajectories: after spinup, the code
# records one observable sample every `save_every` fine integration steps.
save_every = 200

# If true, run different perturbed ensemble trajectories in parallel threads.
parallel_trajectories = true

# Abort/restart a perturbed run if the state norm exceeds this threshold.
max_abs_state = 80.0

# Lower/upper hard state bounds used to reject unstable perturbed trajectories.
state_min = -1.0e300
state_max = 1.0e300

# Maximum number of bound violations allowed before the numerical run errors out.
max_boundary_hits = 40

# For numerical response curves, require at least this fraction of perturbed
# trajectories to finish successfully at a given parameter perturbation size.
# If the valid fraction is smaller, the code shrinks h and retries.
min_valid_fraction = 0.8

# Maximum number of times the code is allowed to shrink the perturbation step
# for an unstable parameter before declaring the numerical response failed.
max_h_shrinks = 6

# Thread chunk size used inside the numerical trajectory loops.
thread_chunk_size = 256

# Multiplicative factor used when shrinking an unstable perturbation:
# new_h = h_shrink_factor * old_h.
h_shrink_factor = 0.5

[observables]
# Standalone observable selection used by this script.
# Modify this list here when you want a different response-plot observable set.
active_names = [
    "mean_x",
    "var_x",
    "skew_x",
    "kurt_x",
    "cov_x_lag1",
]

[figures]
dpi = 180
