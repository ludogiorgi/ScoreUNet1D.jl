h_abs = [0.05, 0.02, 0.01, 0.002, 0.05]
parallel_trajectories = true
max_boundary_hits = 40
save_every = 200
h_rel = 0.005
use_ensemble = true
spinup = 2000
h_shrink_factor = 0.5

[run]
