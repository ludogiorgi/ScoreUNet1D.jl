[paths]
datasets_hdf5 = "scripts/arnold/data/l96_arnold_datasets.hdf5"

[twoscale]
K = 36
J = 10
F = 10.0
h = 1.0
c = 10.0
b = 10.0
dt = 0.005
process_noise_sigma_y = 0.0
process_noise_sigma_x = 1.0

[closure]
F = 10.0
# alpha^(0) coefficients used as first guess and in phi6 Itô balance observable.
# These values are the preliminary polynomial closure fit under the corrected hc/J normalization.
alpha0_initial = 0.04636738678495637
alpha1_initial = 0.3660714354042205
alpha2_initial = 0.011016434610840226
alpha3_initial = -0.0019401319945469076
sigma_initial = 0.41443993804139906
# If true, fit (alpha0..alpha3,sigma) against the bi-scale dataset by regression.
auto_fit = true
fit_dataset_role = "two_scale_fit"
fit_start_index = 2
fit_samples = 50000
fit_min_samples = 500

[datasets.two_scale_observed]
key = "x_two_scale_observed"
spinup_steps = 2_000
save_every = 200
nsamples = 100_000
rng_seed = 101
ensemble_trajectories = 1
parallel_trajectories = true

[datasets.two_scale_fit]
key = "x_two_scale_fit"
spinup_steps = 2_000
save_every = 2
nsamples = 50_002
rng_seed = 101

[datasets.train_stochastic]
key = "x_train_stochastic"
spinup_steps = 2_000
save_every = 200
nsamples = 100_000
rng_seed = 11
target_spacing = 1.0
ensemble_trajectories = 1
parallel_trajectories = true

[datasets.gfdt_stochastic]
key = "x_gfdt_stochastic"
spinup_steps = 2_000
save_every = 2
nsamples = 100_000
rng_seed = 777
