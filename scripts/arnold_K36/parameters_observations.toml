[paths]
output_hdf5 = "scripts/arnold_K36/data/l96_k36_observations.hdf5"
dataset_key = "x_two_scale_observed"
summary_toml = "scripts/arnold_K36/data/observations_summary.toml"

[twoscale]
K = 36
J = 10
F = 10.0
h = 2.0
c = 10.0
b = 8.0
dt = 0.005
process_noise_sigma = 0.0
